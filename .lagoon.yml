docker-compose-yaml: docker-compose.yml

project: cms-druxtjs-org

tasks:
  post-rollout:
    - run:
        name: drush site-install
        command: drush si foundry -y
        service: cli

    - run:
        name: drush tome:import
        command: drush tome:import -y
        service: cli

environments:
  main:
    routes:
      - nginx:
        - cms.druxtjs.org
    cronjobs:
      - name: drush cron
        schedule: "*/15 * * * *"
        command: drush cron
        service: cli
